<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects | F. Oladele</title>
    <meta name="title" content="Femi Sodiq Oladele | Software Architect" />
    <meta
      name="description"
      content="Full Stack JavaScript Developer specializing in high-performance backends, Node.js, and relational architectures."
    />
    <meta
      name="keywords"
      content="Software Engineer, Backend Developer, Node.js, PostgreSQL, React, JavaScript, Femi Oladele"
    />
    <meta name="author" content="Femi Sodiq Oladele" />

    <meta name="theme-color" content="#050505" />

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      href="./image/codersrank-svgrepo-com.svg"
      type="image/svg+xml"
    />

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>

  <body>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <div class="progress-bar" id="progress-bar"></div>

    <header class="navbar">
      <div class="logo-area">
        <a href="index.html" style="text-decoration: none">
          <span class="logo-text"
            >F. Oladele
            <span style="color: var(--text-dim); font-size: 0.8rem"
              >/ ARCHIVE</span
            ></span
          >
        </a>
      </div>

      <div class="mobile-toggle" id="mobile-menu-trigger">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <nav class="nav-menu">
        <a href="#projects" class="nav-link">Repositories</a>
        <a href="#blog" class="nav-link">Engineering Logs</a>
        <a href="#contact" class="nav-link">Inquiry</a>
      </nav>
    </header>

    <main>
      <section id="projects" class="section" style="padding-top: 12rem">
        <div class="container">
          <span class="eyebrow">Open Source</span>
          <h2 class="section-title">
            System <span class="italic-serif">Repositories</span>
          </h2>
          <div id="repo-container" class="bento-grid">
            <div class="terminal-loader">
              <p class="command">> fetching_repositories...</p>
            </div>
          </div>
        </div>
      </section>

      <section id="blog" class="section">
        <div class="container">
          <span class="eyebrow">Technical Writing</span>
          <h2 class="section-title">
            Engineering <span class="italic-serif">Logs</span>
          </h2>
          <div id="blog-content">
            <div class="terminal-loader">
              <p class="command">> indexing_logs...</p>
            </div>
          </div>
        </div>
      </section>

      <section id="contact" class="section contact">
        <div class="container contact-content">
          <span class="eyebrow">Secure Channel</span>
          <h2 class="statement" style="font-size: 3rem">
            Initiate <span class="italic-serif">Connection</span>
          </h2>

          <form
            id="contact-form"
            action="https://formspree.io/f/xwvnbydy"
            method="POST"
          >
            <div class="form-row">
              <input type="text" name="name" placeholder="Full Name" required />
              <input
                type="email"
                name="email"
                placeholder="Email Address"
                required
              />
            </div>
            <textarea
              name="message"
              placeholder="Project details and architectural requirements..."
              rows="4"
              required
            ></textarea>
            <button type="submit" class="btn-premium magnetic">
              Send Message
            </button>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer-grid">
        <p>&copy; 2026 Femi Sodiq Oladele. Built for performance.</p>
        <div class="footer-status">
          <span class="status-dot"></span> System Health: 99.9%
        </div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
