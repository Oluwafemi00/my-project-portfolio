<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev_Femi</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      href="image/codersrank-svgrepo-com.svg"
      type="image/svg+xml"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>
    <nav>
      <h1>
        <img
          class="logo"
          src="./image/codersrank-svgrepo-com.svg"
          alt="logo"
        />Dev_Femi
      </h1>
      <button
        id="theme-toggle"
        onclick="toggleTheme()"
        aria-label="Toggle Theme"
      >
        <svg
          id="theme-svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            class="sun-rays"
            d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
          ></path>
          <circle cx="12" cy="12" r="5" class="main-circle"></circle>
        </svg>
      </button>
    </nav>

    <section id="projects">
      <h2>GitHub Projects</h2>
      <div id="repo-container">Loading projects...</div>
    </section>

    <section id="blog">
      <h2>Latest Blog Post</h2>
      <div id="blog-content">Select a post to read.</div>
    </section>
    <section id="contact">
      <h2>Get In Touch</h2>
      <form
        id="contact-form"
        action="https://formspree.io/f/xwvnbydy"
        method="POST"
      >
        <div class="form-group">
          <input type="text" name="text" placeholder="Your Name" required />
        </div>
        <div class="form-group">
          <input type="email" name="email" placeholder="Your Email" required />
        </div>
        <div class="form-group">
          <textarea
            name="message"
            placeholder="Tell me about your project..."
            rows="5"
            required
          ></textarea>
        </div>
        <button type="submit" id="form-submit">Send Message</button>
        <p id="form-status"></p>
      </form>
    </section>

    <script src="script.js"></script>
  </body>
</html>
